<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <style>
        /* 基礎表格樣式 */
        table {
            border-collapse: collapse;
            width: 250px;
            display: inline-table; /* 讓兩個表格能並排或分別定位 */
            margin-right: 50px;
            vertical-align: top;
        }
        th, td {
            border: 1px solid #000;
            padding: 8px;
            text-align: left;
        }

        /* --- 左側表格顏色設定 --- */
        .left-table th { background-color: #444; color: white; }
        .left-table tr:nth-child(2), .left-table tr:nth-child(4) { background-color: #FFFF00; } /* 黃色 */
        .left-table tr:nth-child(3) { background-color: #FFFFFF; } /* 白色 */

        /* --- 右側綠色表格設定 --- */
        .green-table {
            border: 2px solid #008000; /* 綠色粗邊框 */
        }
        .green-table th { background-color: #008000; color: white; } /* 綠色標題 */
        .green-table td { background-color: #FFFFFF; } /* 全部設為白色 */

        /* --- 固定定位的 div --- */
        .fixed-box {
            position: fixed;
            top: 40px;
            right: 40px;
            border: 2px solid #008000;
            padding: 15px;
            width: 150px;
            background-color: #fff;
            z-index: 100;
        }
    </style>
</head>
<body>

    <!-- 左側表格 -->
    <table class="left-table">
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
        </tr>
        <tr><td>1</td><td>1</td></tr>
        <tr><td>2</td><td>2</td></tr>
        <tr><td>3</td><td>3</td></tr>
    </table>

    <!-- 右側綠色表格 (根據圖片推測) -->
    <table class="green-table">
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
        </tr>
        <tr><td>1</td><td>1</td></tr>
        <tr><td>2</td><td>2</td></tr>
        <tr><td>3</td><td>3</td></tr>
    </table>

    <!-- 固定定位內容 -->
    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
