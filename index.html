<!DOCTYPE html>
<html>
<head>
<style>
  /* 1. 表格樣式 */
  table {
    border-collapse: collapse;
    width: 250px;
    font-family: Arial, sans-serif;
  }
  th, td {
    border: 1px solid #000;
    padding: 8px;
    text-align: left;
  }
  /* 標題列：深灰色背景，白色文字 */
  th {
    background-color: #444;
    color: white;
  }
  /* 第一與第三列資料：黃色背景 */
  tr:nth-child(2), tr:nth-child(4) {
    background-color: #FFFF00;
  }
  /* 第二列資料：白色背景 (預設值) */
  tr:nth-child(3) {
    background-color: #FFFFFF;
  }

  /* 2. 固定定位 div 樣式 */
  .fixed-box {
    position: fixed;   /* 固定定位 */
    top: 20px;         /* 距離頂部 */
    right: 20px;        /* 距離右側 */
    border: 2px solid #4CAF50; /* 綠色邊框 */
    padding: 15px;
    width: 120px;
    background-color: white;
    font-size: 14px;
    line-height: 1.4;
  }
</style>
</head>
<body>

  <table>
    <tr>
      <th>Firstname</th>
      <th>Lastname</th>
    </tr>
    <tr>
      <td>1</td>
      <td>1</td>
    </tr>
    <tr>
      <td>2</td>
      <td>2</td>
    </tr>
    <tr>
      <td>3</td>
      <td>3</td>
    </tr>
  </table>

  <div class="fixed-box">
    This div element has position: fixed;
  </div>

</body>
</html>
